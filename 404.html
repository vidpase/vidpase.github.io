<body>

  <div class="header-inner">
    <button class="brand" id="brandBtn" type="button">

  </div>
</header>
<main class="app-main" id="appMain">

  <section class="view" id="view-login"></section>
  <section class="view" id="view-admin"></section>
  <section class="view" id="view-editor"></section>
  <section class="view" id="view-submissions"></section>
  <section class="view" id="view-public"></section>
</main>
<div class="toast-wrap" id="toastWrap" aria-live="polite"></div>
<div id="modalRoot"></div>
<script type="module" src="/app.js"></script>
