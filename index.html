/* V11.6 — Diferenciación visual: contenido azul y pasos verdes */
:root{
  --content:#2457e6;
  --content-soft:#edf2ff;
  --content-text:#183a9b;
  --steps:#0f9f6e;
  --steps-hover:#0b825b;
  --steps-soft:#ecfbf5;
  --steps-text:#08724f;
  --steps-line:#bfe8d8;
}

/* Contenido que recibirá el usuario: azul */
.resource-card{
  border-color:#bfd0ff;
  box-shadow:0 10px 28px rgba(36,87,230,.08);
}
.resource-content{
  background:linear-gradient(180deg,#ffffff 0%,var(--content-soft) 165%);
  border-top:1px solid #dbe4ff;
}
.resource-card .kicker{color:var(--content)}
.resource-card .btn-primary{
  background:var(--content);
  box-shadow:0 9px 21px rgba(36,87,230,.18);
}
.resource-card .btn-primary:hover{background:#1d49c8}

/* Pasos e indicaciones: verde */
.journey-card{
  border-color:var(--steps-line);
  box-shadow:0 10px 28px rgba(15,159,110,.08);
}
.journey-head{
  background:var(--steps-soft);
  color:var(--steps-text);
  border-bottom-color:#cdeee2;
}
.step-pill{
  background:#fff;
  color:var(--steps-text);
  border:1px solid #b7e3d3;
}
.progress{background:#e2f4ed}
.progress span{background:var(--steps)}
.journey-card .stage-icon{
  background:var(--steps-soft);
  color:var(--steps);
}
.journey-card .keyword-box,
.journey-card .instruction{
  border-color:#c8eadf;
  background:#f3fcf8;
}
.journey-card .keyword-box-emphasis{
  border-color:#b8e5d4;
  background:linear-gradient(180deg,#f5fdf9,#eaf9f3);
}
.journey-card .btn-primary{
  background:var(--steps);
  box-shadow:0 9px 21px rgba(15,159,110,.18);
}
.journey-card .btn-primary:hover{background:var(--steps-hover)}
.journey-card .copy-keyword-btn{
  border-color:var(--steps-hover);
  background:var(--steps);
  box-shadow:0 8px 18px rgba(15,159,110,.20);
}
.journey-card .copy-keyword-btn:hover{
  background:var(--steps-hover);
  border-color:var(--steps-hover);
}
.journey-card .step-one-reminder:not(.retrying){
  border-color:#b8e5d4;
  background:linear-gradient(135deg,#ecfbf5,#f7fdfb);
  color:var(--steps-text);
}
.journey-card .step-one-reminder:not(.retrying) span{color:#3f6f5e}
.journey-card .capture-reference-title{
  background:var(--steps-soft);
  border-color:#c9ebdf;
  color:var(--steps-text);
}
.journey-card .capture-reference-title>.icon{color:var(--steps)}
.journey-card .capture-reference{
  border-color:#a7ddc8;
  background:#f7fdfb;
  box-shadow:0 8px 22px rgba(15,159,110,.08);
}
.journey-card .upload-area:hover{
  border-color:#8ed1b8;
  background:var(--steps-soft);
}
.journey-card .upload-icon{color:var(--steps)}
.journey-card .check-row input{accent-color:var(--steps)}

/* V3.1 — Scroll invisible y portada alineada con movimiento suave */
.wizard-v3{

  height:0;
